name: Deploy Element Atlas to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npx next build
        env:
          GITHUB_PAGES: "true"

      - name: Correct public asset paths
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            sed -i \
              -e 's|url("/hydrogen-nebula.webp")|url("/elements/hydrogen-nebula.webp")|g' \
              -e 's|url(/hydrogen-nebula.webp)|url(/elements/hydrogen-nebula.webp)|g' \
              -e 's|url("/helium-solar-prism.webp")|url("/elements/helium-solar-prism.webp")|g' \
              -e 's|url(/helium-solar-prism.webp)|url(/elements/helium-solar-prism.webp)|g' \
              -e 's|url("/helium-superfluid.webp")|url("/elements/helium-superfluid.webp")|g' \
              -e 's|url(/helium-superfluid.webp)|url(/elements/helium-superfluid.webp)|g' \
              -e 's|href="/favicon.svg"|href="/elements/favicon.svg"|g' \
              "$file"
          done < <(find out -type f \( -name '*.css' -o -name '*.html' \) -print0)
          touch out/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
